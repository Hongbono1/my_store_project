<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>세로형 3단 전단지 템플릿 (빈 텍스트)</title>
  <!-- Tailwind CSS -->
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
</head>
<body class="bg-white py-8">
  <div class="max-w-screen-lg mx-auto flex flex-col sm:flex-row sm:space-x-6 space-y-6 sm:space-y-0">

    <!-- CARD 1 -->
    <article class="flex-1 bg-white border border-gray-300 shadow-lg rounded-lg overflow-hidden flex flex-col">
      <header class="py-4 text-center border-b border-gray-200">
        <img src="https://via.placeholder.com/100x40?text=" alt="" class="mx-auto mb-2" />
        <h2 class="text-green-600 text-2xl font-bold leading-tight"></h2>
        <p class="text-sm text-gray-500 mt-1"></p>
      </header>

      <img src="https://via.placeholder.com/600x300" alt="" class="w-full object-cover">

      <section class="p-6 border-b border-gray-200 text-center">
        <p class="text-green-600 font-semibold mb-2"></p>
        <p class="text-gray-600 text-sm leading-relaxed"></p>
      </section>

      <section class="p-6 flex-1 flex flex-col justify-between">
        <img src="https://via.placeholder.com/300" alt="" class="w-full h-40 object-cover rounded-full mb-4">
        <h3 class="text-gray-800 font-bold text-lg mb-2"></h3>
        <p class="text-gray-600 text-sm"></p>
      </section>

      <footer class="py-4 bg-gray-50 border-t border-gray-200 flex items-center justify-center space-x-4">
        <img src="https://via.placeholder.com/32" alt="" class="h-8">
        <img src="https://via.placeholder.com/32" alt="" class="h-8">
        <img src="https://via.placeholder.com/32" alt="" class="h-8">
      </footer>
    </article>

    <!-- CARD 2 -->
    <article class="flex-1 bg-white border border-gray-300 shadow-lg rounded-lg overflow-hidden flex flex-col">
      <header class="py-4 text-center border-b border-gray-200">
        <img src="https://via.placeholder.com/100x40?text=" alt="" class="mx-auto mb-2" />
        <h2 class="text-gray-900 text-3xl font-bold leading-tight"></h2>
        <p class="text-sm text-gray-500 mt-1"></p>
      </header>

      <img src="https://via.placeholder.com/450x350" alt="" class="w-full object-cover">

      <section class="p-6 text-center border-b border-gray-200">
        <p class="text-red-600 font-bold"></p>
        <p class="text-sm text-gray-600 mt-2 leading-relaxed"></p>
      </section>

      <section class="flex-1 bg-red-100 p-6 flex flex-col justify-between">
        <div class="flex items-center space-x-4 mb-6">
          <img src="https://via.placeholder.com/80" alt="" class="rounded-full shadow">
          <div>
            <h3 class="text-gray-800 font-semibold"></h3>
            <p class="text-xs text-gray-600 leading-snug"></p>
          </div>
        </div>

        <h3 class="text-red-600 font-bold text-xl mb-2"></h3>
        <p class="text-gray-700 text-sm leading-relaxed"></p>
      </section>

      <footer class="py-4 text-center text-xs text-gray-500 border-t border-gray-200"></footer>
    </article>

    <!-- CARD 3 -->
    <article class="flex-1 bg-white border border-gray-300 shadow-lg rounded-lg overflow-hidden flex flex-col">
      <header class="py-4 px-6 border-b border-gray-200">
        <h2 class="text-gray-800 text-2xl font-bold"></h2>
        <p class="text-sm text-gray-500 mt-1"></p>
      </header>

      <section class="p-6 space-y-5">
        <div class="flex items-start space-x-4">
          <div class="h-8 w-8 rounded-full bg-red-500 text-white flex items-center justify-center font-bold"></div>
          <p class="text-gray-700 text-sm leading-relaxed"></p>
        </div>
        <div class="flex items-start space-x-4">
          <div class="h-8 w-8 rounded-full bg-red-500 text-white flex items-center justify-center font-bold"></div>
          <p class="text-gray-700 text-sm leading-relaxed"></p>
        </div>
        <div class="flex items-start space-x-4">
          <div class="h-8 w-8 rounded-full bg-red-500 text-white flex items-center justify-center font-bold"></div>
          <p class="text-gray-700 text-sm leading-relaxed"></p>
        </div>
      </section>

      <section class="px-6 pb-6">
        <div class="flex items-center justify-between border-t border-b border-gray-200 py-4">
          <img src="https://via.placeholder.com/40" alt="" class="h-10">
          <p class="text-xs text-gray-600"></p>
          <img src="https://via.placeholder.com/80x100" alt="" class="h-20">
        </div>
      </section>

      <img src="https://via.placeholder.com/600x280" alt="" class="w-full object-cover">

      <section class="p-6 flex-1 flex flex-col justify-between">
        <h3 class="text-gray-800 text-xl font-bold mb-2"></h3>
        <p class="text-gray-600 text-sm leading-relaxed"></p>
      </section>

      <footer class="py-4 text-center text-xs text-gray-500 border-t border-gray-200"></footer>
    </article>

  </div>
</body>
</html>
